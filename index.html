<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock - Paper - Scissors: Game</title>

  <style>
    body {
      background: linear-gradient(to right, rgb(12, 2, 53), rgb(16, 2, 72));
      padding-left: 20px;
    }

    .button-container {
      display: flex;
      gap: 20px;
    }

    button {
      display: flex;
      justify-content: center;
      align-items: center;
      padding-bottom: 5px;
      width: 90px;
      height: 90px;
      font-size: 40px;
      border-radius: 50%;
      background-color: rgb(47, 47, 75);
      border: 4px solid;
      transition: filter 0.1s ease-in-out;
    }

    button:hover {
      filter: brightness(0.8);
      cursor: pointer;
    }

    button:active {
      filter: brightness(0.6);
    }

    .header1 {
      font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
      color: white;
    }
  </style>
</head>
<body>
  <h1 class="header1">Rock - Paper - Scissors: Game!</h1>
  <div class="button-container">
    <button onclick="
      playGame('Rock')
    ">✊</button>
    
    <button onclick="
      playGame('Paper')
    ">✋</button>

    <button onclick="
      playGame('Scissors')
    ">✌️</button>

    <button onclick="
      score.wins, score.losses, score.ties = 0
      alert('Score Reset!')
    ">🔄</button>
  </div>

  <script>
    const score = {
      wins: 0,
      ties: 0,
      losses: 0,
    };

    function playGame(playerMove) {
      const computerMove = pickComputerMove();
      let winner, result;

      if (playerMove === 'Scissors') {
        if (computerMove === 'Rock') {
          result = 'Winner: Bot!\nNobody is perfect 👏🏻';
          winner = 'bot'
        } else if (computerMove === 'Paper') {
          result = 'Winner: You!\nCongrats! 🎉';
          winner = 'player'
        } else {
          result = 'Result: Tie!\nPoints for everybody!';
          winner = 'tie'
        }
      } else if (playerMove === 'Paper') {
          if (computerMove === 'Rock') {
            result = 'Winner: You!\nCongrats! 🎉';
            winner = 'player'
          } else if (computerMove === 'Paper') {
            result = 'Result: Tie!\nEverybody won!';
            winner = 'tie'
          } else {
            result = 'Winner: Bot!\nBummer! 👏🏻';
            winner = 'bot'
          }
      } else if (playerMove === 'Scissors') {
          if (computerMove === 'Rock') {
            result = 'Result: Tie!\nWin shared!';
            winner = 'tie'
          } else if (computerMove === 'Paper') {
            result = 'Winner: Bot!\nDon\'t give up! 👏🏻';
            winner = 'bot'
          } else {
            result = 'Winner: You!\nCongrats! 🎉';
            winner = 'player'
          };
      }

      if (winner === 'player') {
        score.wins += 1
      } else if (winner === 'bot') {
        score.losses += 1 
      } else if (winner === 'tie') {
        score.ties += 1
      };

      alert(`You: ${playerMove}\nBot: ${computerMove}\n${result}\nWins: ${score.wins} | Losses: ${score.losses} | Ties: ${score.ties}`);
    }

    function pickComputerMove() {
      const randomNum = Math.random();

      if (randomNum >= 0 && randomNum < 1/3) {
        return 'Rock';
      } else if (randomNum >= 1/3 && randomNum < 2/3) {
        return 'Paper';
      } else {
        return 'Scissors';
      };
    }
  </script>
</body>
</html>
